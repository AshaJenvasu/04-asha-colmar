<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>04-asha-colmar</title>
    <link rel="stylesheet" href="/style/general.css" />
    <link rel="stylesheet" href="/style/banner-1.css" />
  </head>
  <body>
    <header>
      <!--Nav-mobile-->
      <nav class="nav-mobile">
        <div>
          <img src="/capstone_colmar_assets/images/ic-logo.svg" alt="logo" />
        </div>
        <div>
          <img
            src="/capstone_colmar_assets/images/ic-on-campus.svg"
            alt="campus"
          />
        </div>
        <div>
          <img
            src="/capstone_colmar_assets/images/ic-online.svg"
            alt="online"
          />
        </div>
        <div>
          <img src="/capstone_colmar_assets/images/ic-login.svg" alt="login" />
        </div>
      </nav>
      <!--Nav-desktop-->
      <div class="nav-desktop">
        <div class="logo">
          <a href="https://colmar-academy-three.vercel.app/">
            <img
              src="/capstone_colmar_assets/images/ic-logo.svg"
              alt="colmarAcademy"
          /></a>
          <span>COLMAR</span>
          <span class="academy"> ACADEMY</span>
        </div>
        <nav>
          <div>On campus</div>
          <div>Online or companies</div>
          <div>Sign in</div>
        </nav>
      </div>
    </header>
    <!--First Banner-->
    <div class="first-banner">
      <div class="first-banner-img">
        <img
          src="/capstone_colmar_assets/images/banner.jpg"
          alt="first-banner"
        />
      </div>
      <div class="first-banner-text">
        <h1>Learn something new everyday</h1>
        <span>Loren ipsum dolor sit amet, consectetur adipiscing elit.</span>
        <button class="first-banner-button">Start here</button>
      </div>
    </div>
  </body>
</html>
